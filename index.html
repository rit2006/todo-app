<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Todo App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <header>
      <h1>TaskFlow</h1>
      <p class="subtitle">Stay on top of your day</p>
    </header>

    <div class="input-area">
      <input
        type="text"
        id="todoInput"
        placeholder="What needs to be done?"
        autocomplete="off"
      />
      <button id="addBtn" onclick="addTodo()">Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <footer class="app-footer">
      <span id="countLabel">0 tasks left</span>
      <button class="clear-btn" onclick="clearDone()">Clear completed</button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
