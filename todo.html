<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.10);
      --border-hover: rgba(0,0,0,0.22);
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --text-tertiary: #aeaea9;
      --accent: #1a1a18;
      --accent-fg: #f7f6f3;
      --danger: #c94040;
      --radius: 10px;
      --radius-pill: 99px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --surface: #1e1e1b;
        --border: rgba(255,255,255,0.10);
        --border-hover: rgba(255,255,255,0.22);
        --text-primary: #eeeee8;
        --text-secondary: #9a9a94;
        --text-tertiary: #5a5a56;
        --accent: #eeeee8;
        --accent-fg: #141412;
        --danger: #e06060;
      }
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2.5rem 1rem 4rem;
    }

    #app { width: 100%; max-width: 540px; }

    .header { margin-bottom: 2rem; }
    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(28px, 6vw, 38px);
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .header .date {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
    }
    .input-row input {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input::placeholder { color: var(--text-tertiary); }
    .input-row input:focus { border-color: var(--border-hover); }

    .btn-add {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 18px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: var(--accent-fg);
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn-add:hover { opacity: 0.82; }
    .btn-add:active { opacity: 0.65; transform: scale(0.98); }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 1rem;
    }
    .tab {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      padding: 5px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab:hover { border-color: var(--border-hover); color: var(--text-primary); }
    .tab.active {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: transparent;
    }

    .todo-list { display: flex; flex-direction: column; gap: 5px; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.15s;
      animation: slide-in 0.18s ease;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .todo-item:hover { border-color: var(--border-hover); }
    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--text-tertiary);
    }

    .check-btn {
      width: 20px;
      height: 20px;
      min-width: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border-hover);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .check-btn:hover { border-color: var(--text-secondary); }
    .check-btn.checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .check-icon { display: none; }
    .check-btn.checked .check-icon { display: block; }

    .todo-text {
      flex: 1;
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.45;
      word-break: break-word;
    }

    .del-btn {
      font-size: 15px;
      line-height: 1;
      color: var(--text-tertiary);
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 3px 5px;
      border-radius: 5px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .todo-item:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: var(--danger); }

    /* Always show delete on touch devices */
    @media (hover: none) { .del-btn { opacity: 1; } }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-tertiary);
      font-size: 14px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .count { font-size: 13px; color: var(--text-secondary); }
    .clear-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--danger);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .clear-btn:hover { text-decoration: underline; }

    @media (max-width: 400px) {
      body { padding: 1.5rem 0.75rem 3rem; }
      .del-btn { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>My tasks</h1>
      <p class="date" id="date-label"></p>
    </div>

    <div class="input-row">
      <input type="text" id="task-input" placeholder="Add a new task…" maxlength="120" />
      <button class="btn-add" onclick="addTask()">Add</button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="setFilter('all', this)">All</button>
      <button class="tab" onclick="setFilter('active', this)">Active</button>
      <button class="tab" onclick="setFilter('done', this)">Done</button>
    </div>

    <div class="todo-list" id="list"></div>

    <div class="footer">
      <span class="count" id="count"></span>
      <button class="clear-btn" onclick="clearDone()">Clear completed</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'tl_tasks_v1';
    let tasks = [];
    let filter = 'all';

    function load() {
      try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { tasks = []; }
      if (!tasks.length) {
        tasks = [
          { id: 1, text: 'Review project proposal', done: false },
          { id: 2, text: 'Schedule team meeting', done: false },
          { id: 3, text: 'Update documentation', done: true }
        ];
      }
    }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch {}
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function addTask() {
      const input = document.getElementById('task-input');
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save(); render();
      input.focus();
    }

    function toggle(id) {
      const t = tasks.find(t => t.id === id);
      if (t) { t.done = !t.done; save(); render(); }
    }

    function remove(id) {
      tasks = tasks.filter(t => t.id !== id);
      save(); render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      save(); render();
    }

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function render() {
      const list = document.getElementById('list');
      const visible = tasks.filter(t =>
        filter === 'all' ? true : filter === 'active' ? !t.done : t.done
      );
      const msgs = { all: 'No tasks yet — add one above', active: 'Nothing left to do', done: 'No completed tasks' };
      if (!visible.length) {
        list.innerHTML = '<div class="empty">' + msgs[filter] + '</div>';
      } else {
        list.innerHTML = visible.map(t => `
          <div class="todo-item${t.done ? ' done' : ''}">
            <button class="check-btn${t.done ? ' checked' : ''}" onclick="toggle(${t.id})" aria-label="${t.done ? 'Mark incomplete' : 'Mark complete'}">
              <svg class="check-icon" width="10" height="7" viewBox="0 0 10 7" fill="none">
                <path d="M1 3.5L3.5 6L9 1" stroke="${getComputedStyle(document.documentElement).getPropertyValue('--accent-fg').trim() || '#f7f6f3'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <span class="todo-text">${esc(t.text)}</span>
            <button class="del-btn" onclick="remove(${t.id})" aria-label="Delete task">&#x2715;</button>
          </div>
        `).join('');
      }
      const active = tasks.filter(t => !t.done).length;
      const done = tasks.filter(t => t.done).length;
      document.getElementById('count').textContent = `${active} remaining · ${done} done`;
    }

    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    const d = new Date();
    document.getElementById('date-label').textContent = d.toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric'
    });

    load();
    render();
  </script>
</body>
</html>
